name: CD  # Nom du workflow : Continuous Deployment

on:
  push:
    branches: [ "main" ]  # Déclenchement automatique lorsqu’un push est effectué sur la branche "main"
  workflow_dispatch:  # Permet de déclencher manuellement ce workflow via l’interface GitHub

jobs:
  deploy:  # Job principal de déploiement
    runs-on: ubuntu-latest  # Utilise une machine virtuelle Ubuntu pour exécuter les étapes

    steps:
      # Checkout the repository
      - name: Vérification du code...
        uses: actions/checkout@v4  # Clone le code source du dépôt pour l'utiliser dans ce workflow

      # Log in to Docker Hub
      - name: Connexion à Docker Hub...
        uses: docker/login-action@v2  # Se connecte à Docker Hub pour permettre le push de l’image
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # Identifiant Docker (stocké dans les secrets GitHub)
          password: ${{ secrets.DOCKER_PASSWORD }}  # Mot de passe Docker (stocké dans les secrets GitHub)

      # Build and push Docker image
      - name: Construction et envoi de l'image Docker...
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rapidnote-do:latest .  # Construit l’image Docker avec le tag "latest"
          docker push ${{ secrets.DOCKER_USERNAME }}/rapidnote-do:latest  # Pousse l’image sur Docker Hub

  notify:
    needs: deploy  # Ce job dépend du succès du job "deploy"
    if: success()  # N'exécute ce job que si le précédent a réussi
    runs-on: ubuntu-latest  # Exécute sur une VM Ubuntu

    steps:
      - name: Envoi d'un email de notification...
        uses: dawidd6/action-send-mail@v3  # Action GitHub pour envoyer un email de notification
        with:
          server_address: smtp.gmail.com  # Serveur SMTP de Gmail
          server_port: 587  # Port SMTP avec STARTTLS
          username: ${{ secrets.MAIL_USERNAME }}  # Nom d’utilisateur Gmail (stocké comme secret)
          password: ${{ secrets.MAIL_PASSWORD }}  # Mot de passe Gmail ou mot de passe d’application (stocké comme secret)
          subject: ✅ CD Réussi - RapidNote  # Sujet du mail de notification
          body: |  # Contenu de l'email
            Bonjour,

            Ceci est un mail automatique envoyé par GitHub Actions, merci de ne pas y répondre.
            Le workflow CD a réussi 🎉 !
            Tous les tests sont passés avec succès.

            - Projet : RapidNote
            - Branche : main

            GitMat15 on GitHub
          to: matheo.gaillard@ecole-hexagone.com  # Destinataire de l’email
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>  # Expéditeur affiché dans l’email
